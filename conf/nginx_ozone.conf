HTTPS Settings

server {
    listen 80;
    server_name ozone.bsu.by www.ozone.bsu.by;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ozone.bsu.by www.ozone.bsu.by;
    client_max_body_size 100M;

    ssl_certificate certs/bsu.by_fullchain_23.crt;
    ssl_certificate_key certs/bsu.by.key;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://ozone_django_app:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        if (!-f $request_filename) {
            proxy_pass http://ozone_django_app:8000;
            break;
        }
    }

    location /static/ {
       alias /staticfiles/;
       types { text/css css; }
    }

    location /media/ {
        alias /media/;
    }

}



