server {
    listen 80;
    server_name localhost 127.0.0.1;
    client_max_body_size 100M;

    location / {
        proxy_pass http://ozone_django_app_dev:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /ozone_static/;
    }

    location /media/ {
        alias /ozone_media/;
    }
}
