services:
  postgres:
    image: postgres:16-alpine
    container_name: ozone_postgres_dev
    env_file:
      - ./ozone_v4/.env.dev
    ports:
      - "5432:5432"

  django:
    build:
      context: ./ozone_v4
    container_name: ozone_django_app_dev
    volumes:
      - ./ozone_v4/:/ozone
      - media_data_dev:/ozone/media
      - static_data:/ozone/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ./ozone_v4/.env.dev

  nginx:
    image: nginx:latest
    container_name: ozone_nginx_dev
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ./conf/nginx_ozone.dev.conf:/etc/nginx/conf.d/nginx_ozone.conf
      - ./ozone_v4/static:/ozone_static:ro
      - media_data_dev:/ozone_media
    ports:
      - "80:80"
    depends_on:
      - django

volumes:
  media_data_dev:
  static_data:
