services:
  postgres:
    image: postgres:16-alpine
    container_name: ozone_postgres
    env_file:
      - ./ozone_v4/.env.dev
      - ./ozone_v4/.env
    volumes:
      - ./db_data_ozone:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  django:
    build:
      context: ./ozone_v4
    volumes:
      - ./ozone_v4/:/ozone
      - static_data:/ozone/staticfiles
      - media_data:/ozone/media
    container_name: ozone_django_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

    env_file:
      - ./ozone_v4/.env.dev
      - ./ozone_v4/.env

  nginx:
   image: nginx:latest
   container_name: ozone_nginx
   volumes:
     - ./conf/nginx.conf:/etc/nginx/nginx.conf
     - ./conf/nginx_ozone.conf:/etc/nginx/conf.d/nginx_ozone.conf
     - ./certs:/etc/nginx/certs
     - static_data:/staticfiles
     - media_data:/media
   ports:
     - "80:80"
     - "443:443"
   depends_on:
     - django

volumes:
  static_data:
  media_data: