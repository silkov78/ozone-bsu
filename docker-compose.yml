services:
  postgres:
    image: postgres:16-alpine
    container_name: ozone_postgres
    env_file:
      - ./ozone_v4/.env
    ports:
      - "5432:5432"

  django:
    build:
      context: ./ozone_v4
    volumes:
      - static_data:/ozone/staticfiles
    container_name: ozone_django_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

    env_file:
      - ./ozone_v4/.env

  nginx:
   image: nginx:latest
   container_name: ozone_nginx
   volumes:
     - ./conf/app_nginx.conf:/etc/nginx/conf.d/app_nginx.conf
     - ./conf/nginx.conf:/etc/nginx/nginx.conf
     - ./certs:/etc/nginx/certs
     - static_data:/staticfiles
   ports:
     - "80:80"
     - "443:443"
   depends_on:
     - django

volumes:
  static_data: